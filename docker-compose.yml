services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uppity
      POSTGRES_PASSWORD: uppity
      POSTGRES_DB: uppity
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uppity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
